<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctors Availability</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-100 font-sans">
   <!--SideNavbar-->

  <section id="sideNav" class="text-white fixed top-0 transition-all duration-1000 z-20"
         style="background-color:#0F1C2E;width: 40%;height: 100vh; left: -40%;">
    <div class="relative cursor-pointer">
      <svg id="closeNav" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-white absolute right-1 top-1">
  <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
</svg>

      
    </div>
    <div class="p-5 shadow" style="font-size: 14px; border-bottom: 1px solid rgba(128, 128, 128, 0.178);">
      <h1 class="font-bold text-2xl">MediDesk</h1>
      <p class="text-gray-400 mt-1">CITY GENERAL HOSPITAL</p>
    </div>
    <div class="p-3 text-gray-400">
      <p style="font-size: 14px;">MAIN</p>
      <ul>
        <li class="p-2 cursor-pointer hover:text-white rounded hover:bg-blue-900 transition-all duration-500" ><span class="p-1">🏠</span>Dashboard</li>
        <li  class="p-2 cursor-pointer hover:text-white rounded hover:bg-blue-900 transition-all duration-500"><span class="p-1 ">👥</span>Patients</li>
        <li  class="p-2 cursor-pointer hover:text-white rounded hover:bg-blue-900 transition-all duration-500"><span class="p-1">📅</span>Appointments</li>
      </ul>
      <p class="P-3 mt-2" style="font-size: 14px;">HOSPITAL</p>
      <ul>
        <li  class="p-2 cursor-pointer hover:text-white rounded hover:bg-blue-900 transition-all duration-500"><span class="p-1">🩺</span>Doctors</li>
        <li  class="p-2 cursor-pointer hover:text-white rounded hover:bg-blue-900 transition-all duration-500"><span class="p-1">🏥</span>Wards & Beds</li>
        <li  class="p-2 cursor-pointer hover:text-white rounded hover:bg-blue-900 transition-all duration-500"><span class="p-1">💳</span>Billing</li>
      </ul>
 
    </div>
  </section>
  <!--Navbar-->

  <section class="flex justify-between p-2 shadow items-center" style="font-size: 14px;">
      <div class="lg:hidden cursor-pointer">
    <svg id="menubar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8">
  <path fill-rule="evenodd" d="M3 6.75A.75.75 0 0 1 3.75 6h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 6.75ZM3 12a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 12Zm0 5.25a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Z" clip-rule="evenodd" />
</svg>

  </div>
    <div>
      <h1 class="font-bold text-2xl">Dashboard</h1>
      <p class="text-gray-400">MediDesk · City General Hospital</p>

    </div>
    
    <div class="flex relative gap-5">
      <span class="absolute p-1  hidden md:block">🔍</span>
      <input class="bg-gray-100 outline-none rounded text-center w-40 p-1  hidden md:block " placeholder="Search patients,doctors... " type="text" style="width: 250px;">
      <span class="p-1 bg-gray-100 rounded border hover:border-blue-500 hover:bg-white cursor-pointer">
  🔔
</span>
      <button id="addPatient" class="bg-blue-600 rounded p-1 text-white"><span>✚</span>New Patient</button>
    </div>
<div class="hidden lg:flex items-center gap-6 text-sm">

  <ul class="flex gap-4">
    <li class="cursor-pointer hover:underline">🏠 Dashboard</li>
    <li class="cursor-pointer hover:underline">👥 Patients</li>
    <li class="cursor-pointer hover:underline">📅 Appointments</li>
  </ul>

  <ul class="flex gap-4">
    <li class="cursor-pointer hover:underline">🩺 Doctors</li>
    <li class="cursor-pointer hover:underline">🏥 Wards & Beds</li>
    <li class="cursor-pointer hover:underline">💳 Billing</li>
  </ul>

</div>

  </section>

  <div class="max-w-7xl mx-auto py-10 px-6">
    
    <div id="doctorContainer" class="grid md:grid-cols-3 gap-8"></div>

  </div>

  <script>
    const doctors = [
      {
        initials: "DP",
        name: "Dr. Priya Mehta",
        specialty: "General Surgery",
        patients: 24,
        rating: 4.9,
        availability: 70,
        color: "bg-blue-600",
        progress: "bg-blue-600"
      },
      {
        initials: "DA",
        name: "Dr. Arjun Nair",
        specialty: "Orthopedics",
        patients: 18,
        rating: 4.8,
        availability: 45,
        color: "bg-purple-600",
        progress: "bg-purple-600"
      },
      {
        initials: "DK",
        name: "Dr. Kavitha Rao",
        specialty: "Pediatrics",
        patients: 31,
        rating: 4.9,
        availability: 20,
        color: "bg-green-600",
        progress: "bg-green-600"
      },
      {
        initials: "DS",
        name: "Dr. Suresh Iyer",
        specialty: "Cardiology",
        patients: 22,
        rating: 4.7,
        availability: 60,
        color: "bg-red-500",
        progress: "bg-red-500"
      },
      {
        initials: "DM",
        name: "Dr. Meena Sharma",
        specialty: "General Medicine",
        patients: 28,
        rating: 4.6,
        availability: 55,
        color: "bg-orange-500",
        progress: "bg-orange-500"
      },
      {
        initials: "DR",
        name: "Dr. Rajan Thomas",
        specialty: "Neurology",
        patients: 15,
        rating: 4.8,
        availability: 80,
        color: "bg-cyan-500",
        progress: "bg-cyan-500"
      }
    ];

    const container = document.getElementById("doctorContainer");

    doctors.forEach(doc => {
      const card = `
        <div class="bg-white rounded-2xl shadow-md p-8 text-center hover:shadow-xl transition duration-300">
          
          <!-- Avatar -->
          <div class="w-20 h-20 mx-auto rounded-full flex items-center justify-center text-white text-2xl font-bold ${doc.color}">
            ${doc.initials}
          </div>

          <!-- Name -->
          <h2 class="mt-4 text-lg font-semibold text-gray-800">${doc.name}</h2>
          <p class="text-gray-500 text-sm">${doc.specialty}</p>

          <!-- Stats -->
          <div class="flex justify-center gap-8 mt-6">
            <div>
              <p class="text-xl font-semibold">${doc.patients}</p>
              <p class="text-gray-500 text-sm">Patients</p>
            </div>

            <div class="flex items-center gap-1">
              <svg class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.12 3.447a1 1 0 00.95.69h3.623c.969 0 1.371 1.24.588 1.81l-2.932 2.13a1 1 0 00-.364 1.118l1.12 3.447c.3.921-.755 1.688-1.54 1.118l-2.932-2.13a1 1 0 00-1.176 0l-2.932 2.13c-.784.57-1.838-.197-1.539-1.118l1.12-3.447a1 1 0 00-.364-1.118L2.88 8.874c-.783-.57-.38-1.81.588-1.81h3.623a1 1 0 00.95-.69l1.12-3.447z"/>
              </svg>
              <div>
                <p class="text-xl font-semibold">${doc.rating}</p>
                <p class="text-gray-500 text-sm">Rating</p>
              </div>
            </div>
          </div>

          <!-- Availability -->
          <div class="mt-6">
            <p class="text-gray-600 text-sm mb-2">Availability</p>
            <div class="w-full bg-gray-200 h-2 rounded-full">
              <div class="${doc.progress} h-2 rounded-full" style="width:${doc.availability}%"></div>
            </div>
            <p class="text-gray-500 text-sm mt-2">${doc.availability}% slots free</p>
          </div>

        </div>
      `;

      container.innerHTML += card;
    });
  </script>

</body>
</html>
