<!DOCTYPE html>
<html lang="en">
<p id="errorMsg" style="color:red; display:none;"></p>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medi Billing</title>
  <link rel="stylesheet" href="patients.css">
</head>

<body>

  <div class="header">

    <div class="left">
      <h2>Patients</h2>
      <p>MediDesk · City General Hospital</p>
    </div>

    <div class="right">

      <div class="search-box">
        <span>🔍</span>
        <input type="text" placeholder="Search patients, doctors...">
      </div>

      <div class="bell">
        🔔
        <span class="dot"></span>
      </div>

      <button id="openModalBtn1" class="btn">+ New Patient</button>

    </div>

  </div>

  <div class="top-bar">

    <!-- Search -->
    <div class="search-box">
      <span>🔍</span>
      <input type="text" placeholder="Search patients...">
    </div>

    <!-- Filter -->
    <select class="filter">
      <option>All Status</option>
      <option>Admitted</option>
      <option>Discharged</option>
      <option>Critical</option>
    </select>

    <!-- Button -->
    <button id="openModalBtn2" class="add-btn">+ Add Patient</button>

  </div>

  <!-- Table -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>PATIENT</th>
          <th>ID</th>
          <th>AGE / GENDER</th>
          <th>CONDITION</th>
          <th>WARD</th>
          <th>STATUS</th>
          <th>ADMITTED</th>
          <th>ACTION</th>
        </tr>
      </thead>

      <tbody id="patientTableBody">
        <!-- Data later JS la add pannalam -->
      </tbody>
    </table>
  </div>
  <!-- Add Patient Button -->

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-box">

      <!-- Header -->
      <div class="modal-header">
        <h2>Register New Patient</h2>
        <span onclick="closeModal()" class="modal-box-x">✕</span>
      </div>

      <!-- Form -->
      <div class="form-grid">

        <div>
          <label>FIRST NAME</label>
          <input type="text" id="firstName" placeholder="First Name">
        </div>

        <div>
          <label>LAST NAME</label>
          <input type="text" id="lastName" placeholder="Last Name">
        </div>

        <div>
          <label>AGE</label>
          <input type="number" id="age" placeholder="AGE">
        </div>

        <div>
          <label>GENDER</label>
          <select id="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Others">Others</option>
          </select>
        </div>

        <div>
          <label>PHONE</label>
          <input type="text" id="phone" placeholder="+91 98765 43210">
        </div>

        <div>
          <label>BLOOD GROUP</label>
          <select>
            <option>A+</option>
            <option>B+</option>
            <option>O+</option>
            <option>OB+</option>
            <option>OB-</option>
            <option>AB-</option>
            <option>AB+</option>
            <option>B-</option>
          </select>
        </div>

        <div class="full">
          <label>CONDITION / DIAGNOSIS</label>
          <input type="text" id="condition" placeholder="e.g. Acute Appendicitis">
        </div>

        <div>
          <label>ASSIGNED DOCTOR</label>
          <select>
            <option value="Dr. Priya Mehta">Dr. Priya Mehta</option>
            <option value="Dr. ROY">Dr. ROY</option>
            <option value="Dr. ramiya">Dr. ramiya</option>
            <option value="Dr. Shalini">Dr. Shalini</option>
          </select>
        </div>

        <div>
          <label >WARD</label>
          <select id="ward">
            <option value="General">General</option>
            <option value="ICU">ICU</option>
            <option value="SCAN">SCAN</option>
            <option value="Discharge">Discharge</option>
          </select>
        </div>

      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <button class="cancel" onclick="closeModal()">Cancel</button>
        <button class="submit" onclick="addpatients()">Register Patient</button>
      </div>

    </div>
  </div>

  <script src="patients.js"></script>

</body>

</html>
